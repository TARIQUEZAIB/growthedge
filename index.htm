<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrowthEdge Consulting</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body { margin:0; font-family:'Inter',sans-serif; color:#111; }

/* NAV */
nav {
    display:flex; justify-content:space-between;
    padding:20px 60px; border-bottom:1px solid #eee;
}
.logo { font-family:'Playfair Display'; }
.logo small { display:block; font-size:10px; color:#666; }

/* HERO */
.hero {
    display:grid; grid-template-columns:1fr 1fr;
    padding:80px 60px; align-items:center;
}
.hero h1 { font-size:48px; }
.hero p { color:#555; }

/* BUTTON */
.btn {
    margin-top:20px; padding:12px 24px;
    background:#0A2540; color:white; border:none;
}

/* SECTION */
.section { padding:80px 60px; }
.services {
    display:grid; grid-template-columns:repeat(3,1fr);
    gap:40px;
}
.service { border-top:1px solid #eee; padding-top:20px; }

/* FORM */
input, textarea {
    width:100%; padding:12px; margin-bottom:10px;
    border:1px solid #ccc;
}

/* STATUS */
#status { font-size:14px; margin-top:10px; }

/* WHATSAPP */
#whatsapp-btn {
    position:fixed; bottom:20px; left:20px;
    background:#25D366; color:white;
    padding:14px; border-radius:50%;
}

/* CHATBOT */
#chatbot-btn {
    position:fixed; bottom:80px; right:20px;
    background:#0A2540; color:white;
    padding:12px; cursor:pointer;
}
#chatbot {
    position:fixed; bottom:140px; right:20px;
    width:300px; background:white;
    border:1px solid #ddd;
    display:none; flex-direction:column;
}
#chat-header { background:#0A2540; color:white; padding:10px; }
#chat-body { padding:10px; height:200px; overflow:auto; }
#chat-input { display:flex; }
#chat-input input { flex:1; border:none; padding:10px; }
#chat-input button { background:#0A2540; color:white; border:none; }

/* RESPONSIVE */
@media(max-width:900px){
    .hero{grid-template-columns:1fr;}
    .services{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<nav>
    <div class="logo">GrowthEdge<small>CONSULTING</small></div>
</nav>

<section class="hero">
    <div>
        <h1>Driving Growth Through SEO, Technology & Talent</h1>
        <p>We help businesses scale with websites, SEO and hiring.</p>
    </div>
    <img src="https://images.unsplash.com/photo-1556761175-4b46a572b786">
</section>

<section class="section">
<h2>Contact Us</h2>

<form id="contact-form">
    <input id="name" placeholder="Name" required>
    <input id="email" placeholder="Email" required>
    <textarea id="msg" placeholder="Requirement" required></textarea>
    <button class="btn">Send Message</button>
</form>

<p id="status"></p>
</section>

<!-- EMAILJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
(function(){
    emailjs.init("CiVaiIzzBo7-zRIqh"); // 🔥 replace
})();

document.getElementById("contact-form").addEventListener("submit", function(e){
    e.preventDefault();

    const status = document.getElementById("status");
    status.innerHTML = "Sending...";

    emailjs.send("service_2lwfetn", "template_vwrozwa", {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        message: document.getElementById("msg").value
    })
    .then(function(){
        status.innerHTML = "✅ Message sent successfully!";
        document.getElementById("contact-form").reset();
    }, function(error){
        status.innerHTML = "❌ Failed to send.";
        console.log(error);
    });
});
</script>

<!-- WHATSAPP -->
<a href="https://wa.me/919891901905" target="_blank" id="whatsapp-btn">💬</a>

<!-- CHATBOT -->
<div id="chatbot-btn" onclick="toggleChat()">Chat</div>

<div id="chatbot">
    <div id="chat-header">Assistant</div>
    <div id="chat-body">
        <p>Hi 👋 What do you need? SEO / Website / Hiring</p>
    </div>
    <div id="chat-input">
        <input id="userInput">
        <button onclick="sendMessage()">➤</button>
    </div>
</div>

<script>
let step=0,data={};

function toggleChat(){
    const bot=document.getElementById("chatbot");
    bot.style.display = bot.style.display==="flex"?"none":"flex";
}

function sendMessage(){
    const input=document.getElementById("userInput");
    const chat=document.getElementById("chat-body");

    let msg=input.value.trim();
    if(!msg) return;

    chat.innerHTML += "<p><b>You:</b> "+msg+"</p>";

    if(step===0){
        data.service=msg;
        chat.innerHTML += "<p><b>Bot:</b> Your name?</p>";
        step=1;
    } else if(step===1){
        data.name=msg;
        chat.innerHTML += "<p><b>Bot:</b> Your email?</p>";
        step=2;
    } else {
        data.email=msg;

        let text=encodeURIComponent(
            `Service:${data.service}\nName:${data.name}\nEmail:${data.email}`
        );

        window.open("https://wa.me/919891901905?text="+text);
        step=0;
    }

    input.value="";
}
</script>

</body>
</html>
